<!DOCTYPE html>
<html lang="lv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2025 Kosmoss - Studentu darbi</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --accent-color: #000000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            width: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Arial', sans-serif;
            padding: 100px 5vw 40px;
            overflow-y: auto;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--bg-color);
            padding: 20px 5vw;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .back-link {
            text-decoration: none;
            color: var(--text-color);
            font-size: 0.95rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border: 1px solid var(--accent-color);
            padding: 10px 18px;
            display: inline-flex;
            gap: 8px;
            align-items: center;
            transition: background 0.2s ease;
        }

        .back-link:hover {
            background: rgba(0, 0, 0, 0.07);
        }

        .gallery {
            display: flex;
            flex-direction: column;
            gap: 60px;
            width: 100%;
            align-items: center;
        }

        .gallery-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 2px solid var(--accent-color);
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
        }

        .author-name {
            width: 100%;
            background: var(--accent-color);
            color: var(--bg-color);
            padding: 12px 20px;
            font-size: 1.1rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            text-align: center;
        }

        .panes-container {
            display: flex;
            flex-direction: row;
            height: min(80vw, 700px);
        }

        .pane {
            position: relative;
            background-color: #fff;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: calc(min(80vw, 700px) * 9 / 16);
        }

        .pane + .pane {
            border-left: 2px solid var(--accent-color);
        }

        iframe.pdf-viewer {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #fff;
        }

        video.gallery-video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            opacity: 0.85;
            transition: opacity 0.25s ease;
            cursor: pointer;
            background: #000;
        }

        .pane:hover video.gallery-video {
            opacity: 1;
        }

        @media (max-width: 1200px) {
            .panes-container {
                flex-direction: column;
                height: auto;
            }

            .pane + .pane {
                border-left: none;
                border-top: 2px solid var(--accent-color);
            }

            .pane {
                height: min(80vw, 500px);
                width: calc(min(80vw, 500px) * 9 / 16);
            }
        }

        @media (max-width: 600px) {
            body {
                padding: 90px 10px 20px;
            }

            .pane {
                height: min(70vw, 350px);
                width: 90vw;
            }
        }
    </style>
</head>

<body>

    <div class="header">

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const panes = document.querySelectorAll('.pane');

            panes.forEach(pane => {
                const video = pane.querySelector('video');
                if (!video) {
                    return;
                }

                video.pause();
                video.currentTime = 0;

                pane.addEventListener('mouseenter', () => {
                    video.play().catch(err => console.warn('Autoplay blocked', err));
                });

                pane.addEventListener('mouseleave', () => {
                    video.pause();
                    video.currentTime = 0;
                });
            });
        });
    </script>
