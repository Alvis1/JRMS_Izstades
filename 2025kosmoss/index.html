<!DOCTYPE html>
<html lang="lv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2025 Kosmoss - Jānis Paraudziņš</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --accent-color: #000000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            width: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Arial', sans-serif;
            padding: 40px 5vw;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .back-link {
            position: absolute;
            top: 30px;
            left: 5vw;
            text-decoration: none;
            color: var(--text-color);
            font-size: 0.95rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border: 1px solid var(--accent-color);
            padding: 10px 18px;
            display: inline-flex;
            gap: 8px;
            align-items: center;
            transition: background 0.2s ease;
        }

        .back-link:hover {
            background: rgba(0, 0, 0, 0.07);
        }

        .gallery {
            display: flex;
            width: 100%;
            justify-content: center;
        }

        .gallery-item {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 20px;
            border: 2px solid var(--accent-color);
            border-radius: 18px;
            overflow: hidden;
            height: 80vh;
            max-height: 80vh;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
            width: 80vw;
            max-width: 1200px;
        }

        .pane {
            position: relative;
            background-color: #fff;
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pane + .pane {
            border-left: 2px solid var(--accent-color);
        }

        iframe.pdf-viewer {
            width: 100%;
            height: 100%;
            border: none;
            flex: 1 1 auto;
            background-color: #fff;
        }

        video.gallery-video {
            width: 100%;
            height: 100%;
            min-height: 100%;
            object-fit: contain;
            opacity: 0.85;
            transition: opacity 0.25s ease;
            cursor: pointer;
            flex: 1 1 auto;
            background: #000;
        }

        .pane:hover video.gallery-video {
            opacity: 1;
        }

        @media (max-width: 900px) {
            body {
                padding: 20px;
                display: block;
                overflow: auto;
            }

            .gallery-item {
                grid-template-columns: 1fr;
                height: auto;
                width: 100%;
            }

            .pane + .pane {
                border-left: none;
                border-top: 2px solid var(--accent-color);
            }

            video.gallery-video {
                min-height: 300px;
            }
        }
    </style>
</head>

<body>

    <a class="back-link" href="../index.html">← Atpakaļ</a>
    <a class="back-link" href="mikrokosmoss/mikro25.html" style="left: auto; right: 5vw;">Mikrokosmoss</a>

    <div class="gallery">
        <div class="gallery-item">
            <div class="pane">
                <iframe src="Janis_Paraudzins_dizains.pdf" class="pdf-viewer" title="Dizaina PDF"></iframe>
            </div>
            <div class="pane">
                <video class="gallery-video" src="Janis_Paraudzins_tels.mp4" muted playsinline loop>
                </video>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const panes = document.querySelectorAll('.pane');

            panes.forEach(pane => {
                const video = pane.querySelector('video');
                if (!video) {
                    return;
                }

                video.pause();
                video.currentTime = 0;

                pane.addEventListener('mouseenter', () => {
                    video.play().catch(err => console.warn('Autoplay blocked', err));
                });

                pane.addEventListener('mouseleave', () => {
                    video.pause();
                    video.currentTime = 0;
                });
            });
        });
    </script>

</body>

</html>
