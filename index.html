<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaņa Rozentāla Mākslas Skolas Virtuālās Izstādes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
            text-align: center;
        }

        .main-title {
            font-size: 3.5em;
            font-weight: bold;
            color: black;
            margin-bottom: 0.3em;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 1.8em;
            color: #333;
            margin-bottom: 2em;
            font-weight: 300;
        }

        .years-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 3em;
        }

        .year-card {
            background: white;
            border: 3px solid black;
            padding: 40px 30px;
            text-decoration: none;
            color: black;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .year-card:hover {
            background: #f5f5f5;
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .year-number {
            font-size: 3em;
            font-weight: bold;
            margin-bottom: 0.2em;
        }

        .year-description {
            font-size: 1em;
            color: #666;
        }

        .footer {
            margin-top: 4em;
            padding-top: 2em;
            border-top: 2px solid #e0e0e0;
            color: #666;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            .main-title {
                font-size: 2.2em;
            }

            .subtitle {
                font-size: 1.3em;
            }

            .years-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .year-card {
                padding: 30px 20px;
            }

            .year-number {
                font-size: 2.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="main-title">Jaņa Rozentāla Mākslas Skola</h1>
        <p class="subtitle">Virtuālās Izstādes</p>

        <div class="years-grid">
            <a href="2025/" class="year-card">
                <div class="year-number">2025</div>
                <div class="year-description">3. kursa personālizstādes</div>
            </a>
            
            <!-- Future years can be added here -->
            <!-- 
            <a href="2026/" class="year-card">
                <div class="year-number">2026</div>
                <div class="year-description">Virtuālās izstādes</div>
            </a>
            -->
        </div>

        <div class="footer">
            <p>Jaņa Rozentāla Mākslas Skola | Priekšmets: Foto Video Pamati. Skolotājs: Alvis Misjuns</p>
        </div>
    </div>
</body>
</html>
