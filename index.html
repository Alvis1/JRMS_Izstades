<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaņa Rozentāla Mākslas Skola 3D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
            text-align: center;
        }

        .main-title {
            font-size: 3.5em;
            font-weight: bold;
            color: black;
            margin-bottom: 0.3em;
            line-height: 1.2;
        }

        .main-title .small {
            font-size: 2.9em;
            color: #bbb;
        }

        .subtitle {
            font-size: 1.8em;
            color: #333;
            margin-bottom: 2em;
            font-weight: 300;
        }

        .years-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-top: 3em;
            max-width: 80%;
            margin-left: auto;
            margin-right: auto;
        }

        .year-card {
            background: white;
            border: 3px solid black;
            padding: 20px 40px;
            text-decoration: none;
            color: black;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }

        .year-card:hover {
            background: #f5f5f5;
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .year-number {
            font-size: 4em;
            font-weight: bold;
            margin-bottom: 0;
        }

        .year-description {
            font-size: 1.3em;
            color: #666;
            text-align: left;
        }

        .year-description strong {
            color: black;
        }

        .footer {
            margin-top: 4em;
            padding-top: 2em;
            border-top: 2px solid #e0e0e0;
            color: #666;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            .main-title {
                font-size: 2.2em;
            }

            .subtitle {
                font-size: 1.3em;
            }

            .years-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .year-card {
                padding: 30px 20px;
            }

            .year-number {
                font-size: 2.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="main-title"><span class="small">MIKC NMV</span> <br>Jaņa Rozentāla Rīgas Mākslas skola</h1>

        <div class="years-grid">
            <a href="2025/2025fotovideo3k.html" class="year-card">
                <div class="year-number">2025</div>
                <div class="year-description">3. kurss - foto un video tehnoloģiju pamati<br>Uzdevums: <strong>Virtuālā personālizstāde</strong></div>
            </a>
            <a href="2025kosmoss/" class="year-card">
                <div class="year-number">2025</div>
                <div class="year-description">3. kurss - foto un video tehnoloģiju pamati<br>Uzdevums: <strong>Kosmosa tēls</strong></div>
            </a>
            
            <!-- Future years can be added here -->
            <!-- 
            <a href="2026/" class="year-card">
                <div class="year-number">2026</div>
                <div class="year-description">Virtuālās izstādes</div>
            </a>
            -->
        </div>

        <div class="footer">
            <p>Skolotājs: Alvis Misjuns</p>
        </div>
    </div>
</body>
</html>
